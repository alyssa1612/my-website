<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f0f0f0;
    }

    h1 {
      color: #333;
    }

    img {
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>

<body>

  <h1>Welcome to My Website 🎉</h1>

  <p>This is my first website on GitHub!</p>

  <!-- Image -->
  <img src="https://via.placeholder.com/300" alt="Example Image">

  <br><br>

  <!-- Buttons -->
  <button onclick="alert('Hello! You clicked the button!')">
    Click Me
  </button>

  <button onclick="changeText()">
    Change Text
  </button>

  <p id="text">This text will change</p>

  <script>
    function changeText() {
      document.getElementById("text").innerHTML = "Text changed! 🎉";
    }
  </script>

</body>
</html>
